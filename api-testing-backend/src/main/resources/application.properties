# =============================================
# API Testing Tool - Backend Configuration
# =============================================

# Server Configuration (Render injects PORT dynamically)
server.port=${PORT:8090}
server.servlet.context-path=/api

# =============================================
# PostgreSQL Database Configuration
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/api_testing_tool}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP defaults)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =============================================
# Jackson JSON Configuration
# =============================================
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# Logging Configuration
# =============================================
logging.level.com.apitester=INFO
logging.level.org.springframework.web=INFO

# =============================================
# Application Info
# =============================================
spring.application.name=api-testing-backend

# =============================================
# Springdoc OpenAPI / Swagger Configuration
# =============================================
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
logging.file.name=target/backend.log
