# =============================================
# API Testing Tool - Backend Configuration
# =============================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# =============================================
# PostgreSQL Database Configuration
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/api_testing_tool
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP defaults)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =============================================
# Jackson JSON Configuration
# =============================================
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# Logging Configuration
# =============================================
logging.level.com.apitester=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================
# Application Info
# =============================================
spring.application.name=api-testing-backend
